stages:
  - lint
  - test
  - build
  - deploy

default:
  image: public.ecr.aws/docker/library/python:3.12-slim

# ---------------------------------------------------------------------------
# Lint
# ---------------------------------------------------------------------------
lint:
  stage: lint
  variables:
    PRE_COMMIT_HOME: "$CI_PROJECT_DIR/.cache/pre-commit"
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  cache:
    key: pre-commit-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pre-commit
      - .cache/pip
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl git > /dev/null
  script:
    - pip install --cache-dir=.cache/pip pre-commit
    - curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/v3.93.4/scripts/install.sh | sh -s -- -b /usr/local/bin v3.93.4
    - pre-commit run --all-files

typecheck:
  stage: lint
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
  script:
    - pip install --cache-dir=.cache/pip -e ".[dev,all]"
    - cd client && pip install --cache-dir=../.cache/pip -e ".[dev]" && cd ..
    - mypy

# ---------------------------------------------------------------------------
# Test
# ---------------------------------------------------------------------------
test-server:
  stage: test
  needs: [lint, typecheck]
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
  script:
    - pip install --cache-dir=.cache/pip -e ".[dev,all]" pytest-cov
    - cd client && pip install --cache-dir=../.cache/pip -e ".[dev]" && cd ..
    - >
      pytest tests/ -v
      --ignore=tests/integration
      --ignore=tests/system
      --cov=agentic_primitives_gateway
      --cov-report=term-missing
      --cov-fail-under=90
  artifacts:
    when: always
    paths:
      - .coverage
    expire_in: 7 days

test-client:
  stage: test
  needs: [lint, typecheck]
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
  script:
    - cd client && pip install --cache-dir=../.cache/pip -e ".[dev]"
    - pytest tests/ -v

# ---------------------------------------------------------------------------
# Build
# ---------------------------------------------------------------------------
build-server:
  stage: build
  needs: [test-server, test-client]
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  script:
    - |
      REF="${CI_COMMIT_TAG:-sha-$(echo $CI_COMMIT_SHA | head -c 7)}"
      printf 'from __future__ import annotations\n\nBUILD_REF = "%s"\n' "$REF" \
        > src/agentic_primitives_gateway/_build_info.py
    - |
      mkdir -p /kaniko/.docker
      echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64)\"}}}" \
        > /kaniko/.docker/config.json
    - >
      /kaniko/executor
      --context "$CI_PROJECT_DIR"
      --dockerfile "$CI_PROJECT_DIR/Dockerfile"
      --destination "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
      --destination "$CI_REGISTRY_IMAGE:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

build-client:
  stage: build
  needs: [test-server, test-client]
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
  before_script:
    - |
      REF="sha-$(echo $CI_COMMIT_SHA | head -c 7)"
      printf 'from __future__ import annotations\n\nBUILD_REF = "%s"\n' "$REF" \
        > client/src/agentic_primitives_gateway_client/_build_info.py
  script:
    - pip install --cache-dir=.cache/pip build
    - python -m build ./client
  artifacts:
    paths:
      - client/dist/*.whl
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# ---------------------------------------------------------------------------
# Deploy
# ---------------------------------------------------------------------------
pages:
  stage: deploy
  needs: [test-server, test-client]
  script:
    - pip install mkdocs-material
    - mkdocs build --strict --site-dir public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
