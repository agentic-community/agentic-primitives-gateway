stages:
  - lint
  - test
  - build
  - deploy

default:
  image: python:3.12-slim

# ---------------------------------------------------------------------------
# Lint
# ---------------------------------------------------------------------------
lint:
  stage: lint
  variables:
    PRE_COMMIT_HOME: "$CI_PROJECT_DIR/.cache/pre-commit"
  cache:
    key: pre-commit-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pre-commit
      - .cache/pip
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl > /dev/null
  script:
    - pip install --cache-dir=.cache/pip pre-commit
    - curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/v3.93.4/scripts/install.sh | sh -s -- -b /usr/local/bin v3.93.4
    - pre-commit run --all-files

typecheck:
  stage: lint
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
  script:
    - pip install --cache-dir=.cache/pip -e ".[dev,agentcore,langfuse,mem0]"
    - cd client && pip install --cache-dir=../.cache/pip -e ".[dev]" && cd ..
    - mypy

# ---------------------------------------------------------------------------
# Test
# ---------------------------------------------------------------------------
test-server:
  stage: test
  needs: [lint, typecheck]
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
  script:
    - pip install --cache-dir=.cache/pip -e ".[dev,agentcore,langfuse,mem0]" pytest-cov
    - >
      pytest tests/ -v
      --cov=agentic_primitives_gateway
      --cov-report=term-missing
      --cov-fail-under=90
  artifacts:
    when: always
    paths:
      - .coverage
    expire_in: 7 days

test-client:
  stage: test
  needs: [lint, typecheck]
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
  script:
    - cd client && pip install --cache-dir=../.cache/pip -e ".[dev]"
    - pytest tests/ -v

# ---------------------------------------------------------------------------
# Build
# ---------------------------------------------------------------------------
build-server:
  stage: build
  needs: [test-server, test-client]
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - |
      REF="${CI_COMMIT_TAG:-sha-$(echo $CI_COMMIT_SHA | head -c 7)}"
      echo "BUILD_REF=$REF" >> build.env
      printf 'from __future__ import annotations\n\nBUILD_REF = "%s"\n' "$REF" \
        > src/agentic_primitives_gateway/_build_info.py
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" -t "$CI_REGISTRY_IMAGE:latest" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

build-client:
  stage: build
  needs: [test-server, test-client]
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
  before_script:
    - |
      REF="sha-$(echo $CI_COMMIT_SHA | head -c 7)"
      printf 'from __future__ import annotations\n\nBUILD_REF = "%s"\n' "$REF" \
        > client/src/agentic_primitives_gateway_client/_build_info.py
  script:
    - pip install --cache-dir=.cache/pip build
    - python -m build ./client
  artifacts:
    paths:
      - client/dist/*.whl
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# ---------------------------------------------------------------------------
# Deploy
# ---------------------------------------------------------------------------
pages:
  stage: deploy
  needs: [test-server, test-client]
  script:
    - pip install mkdocs-material
    - mkdocs build --strict --site-dir public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
