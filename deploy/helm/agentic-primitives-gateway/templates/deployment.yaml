apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentic-primitives-gateway.fullname" . }}
  labels:
    {{- include "agentic-primitives-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "agentic-primitives-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentic-primitives-gateway.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: AGENTIC_PRIMITIVES_GATEWAY_CONFIG_FILE
              value: /etc/agentic-primitives-gateway/config.yaml
          volumeMounts:
            - name: config
              mountPath: /etc/agentic-primitives-gateway
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "agentic-primitives-gateway.fullname" . }}-config
