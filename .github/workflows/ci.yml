name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Install TruffleHog
        run: curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/v3.93.4/scripts/install.sh | sh -s -- -b /usr/local/bin v3.93.4
      - run: pip install pre-commit
      - run: pre-commit run --all-files

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,all]"
      - run: cd client && pip install -e ".[dev]"
      - run: mypy

  test-server:
    name: Server tests
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,all]" pytest-cov
      - run: cd client && pip install -e ".[dev]"
      - name: Run server tests
        run: >
          pytest tests/ -v
          --ignore=tests/integration
          --ignore=tests/system
          --cov=agentic_primitives_gateway
          --cov-report=term-missing
          --cov-fail-under=90
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: coverage-report
          path: .coverage

  test-client:
    name: Client tests
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - run: cd client && pip install -e ".[dev]"
      - run: cd client && pytest tests/ -v

  build-server:
    name: Build server image
    needs: [test-server, test-client]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Stamp build ref
        run: |
          REF="sha-$(echo $GITHUB_SHA | head -c 7)"
          echo "BUILD_REF=$REF" >> "$GITHUB_ENV"
          printf 'from __future__ import annotations\n\nBUILD_REF = "%s"\n' "$REF" \
            > src/agentic_primitives_gateway/_build_info.py
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-client:
    name: Build & release client wheel
    needs: [test-server, test-client]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Stamp build ref
        run: |
          REF="sha-$(echo $GITHUB_SHA | head -c 7)"
          echo "BUILD_REF=$REF" >> "$GITHUB_ENV"
          printf 'from __future__ import annotations\n\nBUILD_REF = "%s"\n' "$REF" \
            > client/src/agentic_primitives_gateway_client/_build_info.py
      - run: pip install build
      - run: python -m build ./client
      - name: Read client version
        id: version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('client/pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=client-v${VERSION}-${BUILD_REF}" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Client ${{ steps.version.outputs.version }} (${{ env.BUILD_REF }})"
          body: |
            Client wheel for commit ${{ github.sha }}.

            Install with:
            ```
            pip install 'agentic-primitives-gateway-client @ https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/agentic_primitives_gateway_client-${{ steps.version.outputs.version }}-py3-none-any.whl'
            ```
          files: client/dist/*.whl
          make_latest: true
