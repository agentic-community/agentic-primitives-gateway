## Mixed — both AgentCore and self-hosted providers with JWT auth and Cedar.
##
## Every primitive has both an AgentCore and a self-hosted backend registered.
## The "default" picks which one is used unless overridden per-request via
## X-Provider-* headers (e.g. X-Provider-Memory: agentcore).
##
## This enables gradual migration: run both backends simultaneously and
## switch agents one at a time with header-based routing.
##
## Prerequisites:
##   - AWS credentials (for Bedrock + AgentCore)
##   - AgentCore memory resource (export AGENTCORE_MEMORY_ID)
##   - Redis at localhost:6379
##   - Milvus at localhost:19530
##   - Langfuse at localhost:3000
##   - Jupyter at localhost:8888 (optional)
##   - Selenium Grid at localhost:4444 (optional)
##   - OIDC provider for JWT auth (Keycloak, Cognito, Auth0)
##
## Install & run:
##   pip install -e ".[agentcore,mem0,langfuse,jupyter,selenium,redis,jwt,cedar]"
##   JWT_ISSUER=https://keycloak.example.com/realms/my-realm \
##     ./run.sh mixed
##
## Key environment variables:
##   JWT_ISSUER            — OIDC issuer URL (required)
##   JWT_CLIENT_ID         — Public client ID for UI OIDC flow (default: agentic-gateway)
##   AGENTCORE_MEMORY_ID   — AgentCore memory resource ID
##   LANGFUSE_PUBLIC_KEY   — Langfuse public key
##   LANGFUSE_SECRET_KEY   — Langfuse secret key
##   AWS_REGION            — AWS region (default: us-east-1)
##   REDIS_URL             — Redis URL (default: redis://localhost:6379/0)
##   KC_ADMIN_CLIENT_ID    — Keycloak admin client for credential resolution (optional)
##   KC_ADMIN_CLIENT_SECRET — Keycloak admin secret (optional)

# ── Authentication ────────────────────────────────────────────────────

auth:
  backend: jwt
  jwt:
    issuer: "${JWT_ISSUER}"
    audience: "${JWT_AUDIENCE}"
    client_id: "${JWT_CLIENT_ID:=agentic-gateway}"
    algorithms: ["RS256"]
    claims_mapping:
      groups: "${JWT_GROUPS_CLAIM:=groups}"
      scopes: "${JWT_SCOPES_CLAIM:=scope}"

# ── Cedar Policy Enforcement ─────────────────────────────────────────

enforcement:
  backend: "agentic_primitives_gateway.enforcement.cedar.CedarPolicyEnforcer"
  config:
    policy_refresh_interval: 5

# ── Providers (both AgentCore and self-hosted for each primitive) ─────

providers:
  # Memory: default self-hosted, AgentCore available via X-Provider-Memory: agentcore
  memory:
    default: "mem0"
    backends:
      mem0:
        backend: "agentic_primitives_gateway.primitives.memory.mem0_provider.Mem0MemoryProvider"
        config:
          vector_store:
            provider: milvus
            config:
              collection_name: agentic_memories
              url: "http://${MILVUS_HOST:=localhost}:${MILVUS_PORT:=19530}"
              token: ""
              embedding_model_dims: 1024
          llm:
            provider: aws_bedrock
            config:
              model: us.anthropic.claude-sonnet-4-20250514-v1:0
          embedder:
            provider: aws_bedrock
            config:
              model: amazon.titan-embed-text-v2:0
      agentcore:
        backend: "agentic_primitives_gateway.primitives.memory.agentcore.AgentCoreMemoryProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"
          memory_id: "${AGENTCORE_MEMORY_ID:=}"

  # Observability: default self-hosted, AgentCore available
  observability:
    default: "langfuse"
    backends:
      langfuse:
        backend: "agentic_primitives_gateway.primitives.observability.langfuse.LangfuseObservabilityProvider"
        config:
          public_key: "${LANGFUSE_PUBLIC_KEY:=}"
          secret_key: "${LANGFUSE_SECRET_KEY:=}"
          base_url: "${LANGFUSE_BASE_URL:=http://localhost:3000}"
      agentcore:
        backend: "agentic_primitives_gateway.primitives.observability.agentcore.AgentCoreObservabilityProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"
          service_name: "agentic-primitives-gateway"

  # LLM: Bedrock (same provider — no self-hosted LLM backend)
  llm:
    default: "bedrock"
    backends:
      bedrock:
        backend: "agentic_primitives_gateway.primitives.llm.bedrock.BedrockConverseProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"
          default_model: "us.anthropic.claude-sonnet-4-20250514-v1:0"

  # Code interpreter: default self-hosted Jupyter, AgentCore available
  code_interpreter:
    default: "jupyter"
    backends:
      jupyter:
        backend: "agentic_primitives_gateway.primitives.code_interpreter.jupyter.JupyterCodeInterpreterProvider"
        config:
          base_url: "${JUPYTER_URL:=http://localhost:8888}"
          token: "${JUPYTER_TOKEN:=}"
          kernel_name: "${JUPYTER_KERNEL:=python3}"
          execution_timeout: 30.0
      agentcore:
        backend: "agentic_primitives_gateway.primitives.code_interpreter.agentcore.AgentCoreCodeInterpreterProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"

  # Browser: default self-hosted Selenium Grid, AgentCore available
  browser:
    default: "selenium_grid"
    backends:
      selenium_grid:
        backend: "agentic_primitives_gateway.primitives.browser.selenium_grid.SeleniumGridBrowserProvider"
        config:
          hub_url: "${SELENIUM_HUB_URL:=http://localhost:4444}"
          browser: "${SELENIUM_BROWSER:=chrome}"
      agentcore:
        backend: "agentic_primitives_gateway.primitives.browser.agentcore.AgentCoreBrowserProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"

  # Identity: AgentCore (no self-hosted equivalent)
  identity:
    default: "agentcore"
    backends:
      agentcore:
        backend: "agentic_primitives_gateway.primitives.identity.agentcore.AgentCoreIdentityProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"

  # Tools: AgentCore Gateway (MCP tool registry)
  tools:
    default: "agentcore"
    backends:
      agentcore:
        backend: "agentic_primitives_gateway.primitives.tools.agentcore.AgentCoreGatewayProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"

  # Policy: AgentCore (Cedar policy management)
  policy:
    default: "agentcore"
    backends:
      agentcore:
        backend: "agentic_primitives_gateway.primitives.policy.agentcore.AgentCorePolicyProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"

  # Evaluations: Langfuse (self-hosted) + AgentCore
  evaluations:
    default: "langfuse"
    backends:
      langfuse:
        backend: "agentic_primitives_gateway.primitives.evaluations.langfuse.LangfuseEvaluationsProvider"
        config: {}
      agentcore:
        backend: "agentic_primitives_gateway.primitives.evaluations.agentcore.AgentCoreEvaluationsProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"

  # Tasks: Redis
  tasks:
    default: "redis"
    backends:
      redis:
        backend: "agentic_primitives_gateway.primitives.tasks.redis.RedisTasksProvider"
        config:
          redis_url: "${REDIS_URL:=redis://localhost:6379/0}"

# ── Credential resolution ─────────────────────────────────────────────

allow_server_credentials: fallback

credentials:
  resolver: oidc
  oidc:
    aws:
      enabled: false
  writer:
    backend: keycloak
    config:
      admin_client_id: "${KC_ADMIN_CLIENT_ID:-}"
      admin_client_secret: "${KC_ADMIN_CLIENT_SECRET:-}"
  cache:
    ttl_seconds: 300
    max_entries: 10000

# ── Governance (audit + structured logs) ──────────────────────────────
#
# stdout_json gives k8s-native log shipping; redis_stream adds a durable
# cross-replica audit bus that a SIEM shipper can consume via XREAD.
# Principal-ID hashing is enabled for multi-tenant hygiene — set to
# false if raw IDs are required for compliance.

audit:
  enabled: true
  stdout_json: true
  sinks:
    - name: durable
      backend: redis_stream
      config:
        redis_url: "${REDIS_URL:=redis://localhost:6379/0}"
        stream: "gateway:audit"
        maxlen: 100000
  redact_principal_id: false
  queue_size: 2048
  sink_timeout_seconds: 2.0

logging:
  format: json
  sanitize: true

# ── Stores (Redis-backed for multi-replica) ───────────────────────────

agents:
  store:
    backend: redis
    config:
      redis_url: "${REDIS_URL:=redis://localhost:6379/0}"
  specs:
    research-assistant:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "A research assistant with memory, browser, and code execution"
      system_prompt: |
        You are a research assistant with long-term memory and web browsing.

        **Memory:** Use remember to store facts, search_memory to find them via
        semantic similarity, recall for exact key lookup, list_memories to browse,
        and forget to clean up. Always search memory before saying you don't know.

        **Browser:** Use navigate to visit pages, read_page to extract content,
        click and type_text for interaction, screenshot for visual inspection.
      primitives:
        memory:
          enabled: true
          namespace: "agent:{agent_name}"
        browser:
          enabled: true
      max_turns: 100
      hooks:
        auto_memory: true
        auto_trace: true
    researcher:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "A focused researcher that searches memory and the web for information"
      system_prompt: |
        You are a focused researcher with web browsing capabilities and long-term memory.

        **Research workflow:**
        1. Always search_memory first — you may already have the answer from previous research.
        2. If not in memory, browse the web. Use navigate to visit pages, read_page to extract content.
        3. Store important findings with remember so you don't repeat work.

        **Web browsing best practices:**
        - For web searches, use DuckDuckGo (https://duckduckgo.com/?q=your+query) instead of Google.
          Google often blocks automated browsers with CAPTCHAs.
        - After navigating, always read_page first to understand the page before interacting.
        - If you get a "NoSuchElementException" (element not found), read_page to see the current
          page state, then try a different selector or approach.
        - If you hit a CAPTCHA, access denied, or bot detection page, go back and try a different
          website. Do not waste turns trying to bypass it.
        - Prefer reading article content directly over clicking through complex navigation.
        - If a site is paywalled or requires login, move on to another source.
        - Use evaluate_js as a last resort to extract content when read_page doesn't capture it
          (e.g., dynamically loaded content).

        **Error handling:**
        - If a tool call returns an error, do NOT retry the exact same call. Adjust your approach.
        - If multiple sources fail, synthesize what you have rather than continuing to fail.
        - Always store partial findings — something is better than nothing.
      primitives:
        memory:
          enabled: true
        browser:
          enabled: true
      max_turns: 100
      hooks:
        auto_memory: true
        auto_trace: true
    coder:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "A coding assistant with Jupyter kernel and persistent memory"
      system_prompt: |
        You are a coding assistant with a live Jupyter kernel. Write clean,
        correct code. Execute it to verify results. State persists across calls —
        variables, imports, and data frames survive between executions. Use memory
        to store useful code snippets and results.
      primitives:
        memory:
          enabled: true
        code_interpreter:
          enabled: true
      max_turns: 100
      hooks:
        auto_memory: true
        auto_trace: true
    coordinator:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "A coordinator that delegates tasks to specialized agents"
      system_prompt: |
        You are a coordinator agent. You have access to specialized agents:
        - call_researcher: for research and information gathering (has browser + memory)
        - call_coder: for writing and running code (has Jupyter kernel + memory)
        Delegate tasks to the appropriate agent. Synthesize their responses
        into a coherent answer for the user.
        IMPORTANT: When tasks can be done independently, call multiple agents
        in parallel by making multiple tool calls in the same response.
      primitives:
        memory:
          enabled: true
        agents:
          enabled: true
          tools: ["researcher", "coder"]
      hooks:
        auto_memory: true
        auto_trace: true
    meta-agent:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "Creates specialized agents on the fly and delegates tasks to them"
      system_prompt: |
        You are a meta-agent. When you receive a task, you create specialized agents
        tailored to the work and delegate to them.

        Workflow:
        1. Use list_primitives to see what capabilities are available
        2. Use create_agent to build a specialist with the right primitives and a
           focused system prompt. Only enable the primitives the agent actually needs.
        3. Use delegate_to to send the agent its task
        4. Use delete_agent to clean up ephemeral agents when done
        5. Synthesize the results into a final response

        Design each agent's system prompt to be specific and actionable.
        You can create multiple agents and delegate to them in parallel when tasks
        are independent.
      primitives:
        memory:
          enabled: true
        agent_management:
          enabled: true
      hooks:
        auto_memory: true
        auto_trace: true
    planner:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "Decomposes requests into tasks for team execution"
      system_prompt: |
        You are a task planner for a team of specialized agents. Your job is to
        decompose requests into multiple concrete tasks and assign each to the
        right team member. You MUST create tasks for ALL workers when the request
        involves their specialties. Always create at least one task per relevant
        worker. Think carefully about what each worker can do and create tasks
        that fully utilize the team. Where possible, write parallel tasks,
        for instance: if the task is to evaluate 3 things, write out a task for each
        evaluation.
      primitives: {}
      hooks:
        auto_memory: false
        auto_trace: false
    synthesizer:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "Synthesizes team results into coherent responses"
      system_prompt: |
        You are a synthesizer. Given the results of multiple completed tasks,
        produce a clear, comprehensive response that addresses the original request.
      primitives: {}
      hooks:
        auto_memory: false
        auto_trace: false

teams:
  store:
    backend: redis
    config:
      redis_url: "${REDIS_URL:=redis://localhost:6379/0}"
  specs:
    research-team:
      description: "A team that researches topics and writes code collaboratively"
      planner: "planner"
      synthesizer: "synthesizer"
      workers: ["researcher", "coder"]
      shared_memory_namespace: "team:{team_name}"
      global_max_turns: 100
      global_timeout_seconds: 300
