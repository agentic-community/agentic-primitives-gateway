## E2E Mixed Providers: the "best of both worlds" pattern.
##
## This config demonstrates per-primitive provider routing — mixing
## self-hosted open-source backends with AWS-managed AgentCore services:
##
##   Self-hosted (your data stays in your infrastructure):
##     Memory        -> mem0 + Milvus   (vector search)
##     Observability -> Langfuse        (tracing & evaluation)
##
##   AWS-managed (heavy compute offloaded to AWS):
##     Code Interp.  -> AgentCore       (sandboxed execution)
##     Browser       -> AgentCore       (cloud browser)
##     Identity      -> AgentCore       (credential exchange)
##     Tools         -> AgentCore       (MCP gateway)
##     Gateway       -> Bedrock         (LLM routing)
##
## JWT auth (Keycloak), Cedar enforcement, Redis stores for multi-replica.
##
## Required:
##   pip install -e ".[mem0,langfuse,agentcore,redis,jwt,cedar]"
##
## Prerequisites:
##   docker run -d --name milvus -p 19530:19530 milvusdb/milvus:latest
##   Redis running at localhost:6379
##   Keycloak (or any OIDC provider) for JWT auth
##
## Usage:
##   LANGFUSE_PUBLIC_KEY=pk-lf-... LANGFUSE_SECRET_KEY=sk-lf-... \
##   AGENTIC_PRIMITIVES_GATEWAY_CONFIG_FILE=configs/e2e-mixed.yaml \
##     uvicorn agentic_primitives_gateway.main:app --reload
##
## Client-side provider routing:
##   Clients can also override providers per-request via X-Provider-* headers:
##     curl -H "X-Provider-Memory: mem0" -H "X-Provider-Observability: langfuse" ...
##   This config sets the server defaults; client headers take precedence.

# ── Authentication ────────────────────────────────────────────────────

auth:
  backend: jwt
  jwt:
    issuer: "${JWT_ISSUER:=}"
    audience: "${JWT_AUDIENCE}"
    client_id: "${JWT_CLIENT_ID:=agentic-gateway}"
    algorithms: ["RS256"]
    claims_mapping:
      groups: "groups"
      scopes: "scope"
    jwks_cache_seconds: 300

# ── Providers (mixed routing) ────────────────────────────────────────

providers:
  # Memory: mem0 + Milvus — your data stays in your infrastructure
  memory:
    default: "mem0"
    backends:
      mem0:
        backend: "agentic_primitives_gateway.primitives.memory.mem0_provider.Mem0MemoryProvider"
        config:
          vector_store:
            provider: milvus
            config:
              collection_name: agentic_memories_e2e
              url: "http://${MILVUS_HOST:=localhost}:${MILVUS_PORT:=19530}"
              token: ""
              embedding_model_dims: 1024
          llm:
            provider: aws_bedrock
            config:
              model: us.anthropic.claude-sonnet-4-20250514-v1:0
          embedder:
            provider: aws_bedrock
            config:
              model: amazon.titan-embed-text-v2:0

  # Observability: Langfuse — your traces stay in your infrastructure
  observability:
    default: "langfuse"
    backends:
      langfuse:
        backend: "agentic_primitives_gateway.primitives.observability.langfuse.LangfuseObservabilityProvider"
        config:
          public_key: "${LANGFUSE_PUBLIC_KEY:=}"
          secret_key: "${LANGFUSE_SECRET_KEY:=}"
          base_url: "${LANGFUSE_BASE_URL:=https://cloud.langfuse.com}"

  # Gateway: Bedrock — AWS-managed LLM routing
  llm:
    default: "bedrock"
    backends:
      bedrock:
        backend: "agentic_primitives_gateway.primitives.llm.bedrock.BedrockConverseProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"
          default_model: "us.anthropic.claude-sonnet-4-20250514-v1:0"

  # Code Interpreter: AgentCore — AWS-managed sandboxed execution
  code_interpreter:
    default: "agentcore"
    backends:
      agentcore:
        backend: "agentic_primitives_gateway.primitives.code_interpreter.agentcore.AgentCoreCodeInterpreterProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"

  # Browser: AgentCore — AWS-managed cloud browser
  browser:
    default: "agentcore"
    backends:
      agentcore:
        backend: "agentic_primitives_gateway.primitives.browser.agentcore.AgentCoreBrowserProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"

  # Identity: AgentCore — AWS-managed credential exchange
  identity:
    default: "agentcore"
    backends:
      agentcore:
        backend: "agentic_primitives_gateway.primitives.identity.agentcore.AgentCoreIdentityProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"

  # Tools: AgentCore — AWS-managed MCP gateway
  tools:
    default: "agentcore"
    backends:
      agentcore:
        backend: "agentic_primitives_gateway.primitives.tools.agentcore.AgentCoreGatewayProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"

  # Policy: AgentCore — Cedar enforcement reads policies from this provider
  policy:
    default: "agentcore"
    backends:
      agentcore:
        backend: "agentic_primitives_gateway.primitives.policy.agentcore.AgentCorePolicyProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"

  # Evaluations: noop
  evaluations:
    default: "noop"
    backends:
      noop:
        backend: "agentic_primitives_gateway.primitives.evaluations.noop.NoopEvaluationsProvider"
        config: {}

  # Tasks: Redis for multi-replica task boards
  tasks:
    default: "redis"
    backends:
      redis:
        backend: "agentic_primitives_gateway.primitives.tasks.redis.RedisTasksProvider"
        config:
          redis_url: "${REDIS_URL:=redis://localhost:6379/0}"

# ── Cedar Policy Enforcement ─────────────────────────────────────────

enforcement:
  backend: "agentic_primitives_gateway.enforcement.cedar.CedarPolicyEnforcer"
  config:
    policy_refresh_interval: 5

allow_server_credentials: fallback

# ── Declarative Agents ───────────────────────────────────────────────

agents:
  store:
    backend: redis
    config:
      redis_url: "${REDIS_URL:=redis://localhost:6379/0}"
  specs:
    research-assistant:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "Full-stack assistant with all primitives (mixed providers)"
      system_prompt: |
        You are a capable research assistant with a mixed-provider backend.
        Your memory is stored in Milvus (self-hosted), your actions are traced
        in Langfuse (self-hosted), and compute-heavy tasks run on AWS AgentCore.

        **Memory (mem0 + Milvus):**
        - remember: Store information with a descriptive key.
        - search_memory: Semantic search across all memories.
        - recall: Get a specific memory by key.
        - list_memories: See everything stored.
        - forget: Remove outdated information.

        **Code (AgentCore sandbox):**
        - execute_code: Run Python in a persistent sandbox.

        **Browser (AgentCore):**
        - navigate, read_page, click, type_text, screenshot, evaluate_js.

        **Tools (AgentCore MCP):**
        - search_tools: Find available tools.
        - invoke_tool: Run an external tool.

        **Identity (AgentCore):**
        - get_token: Exchange identity for OAuth2 tokens.

        Think step by step. Search memory before saying you don't know.
        Store important findings for future reference.
      primitives:
        memory:
          enabled: true
          namespace: "agent:{agent_name}:{session_id}"
        code_interpreter:
          enabled: true
        browser:
          enabled: true
        tools:
          enabled: true
        identity:
          enabled: true
      hooks:
        auto_memory: true
        auto_trace: true

    researcher:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "Focused researcher with memory and browser"
      system_prompt: |
        You are a focused researcher with web browsing capabilities and long-term memory.

        **Research workflow:**
        1. Always search_memory first — you may already have the answer from previous research.
        2. If not in memory, browse the web. Use navigate to visit pages, read_page to extract content.
        3. Store important findings with remember so you don't repeat work.

        **Web browsing best practices:**
        - For web searches, use DuckDuckGo (https://duckduckgo.com/?q=your+query) instead of Google.
          Google often blocks automated browsers with CAPTCHAs.
        - After navigating, always read_page first to understand the page before interacting.
        - If you get a "NoSuchElementException" (element not found), read_page to see the current
          page state, then try a different selector or approach.
        - If you hit a CAPTCHA, access denied, or bot detection page, go back and try a different
          website. Do not waste turns trying to bypass it.
        - Prefer reading article content directly over clicking through complex navigation.
        - If a site is paywalled or requires login, move on to another source.
        - Use evaluate_js as a last resort to extract content when read_page doesn't capture it
          (e.g., dynamically loaded content).

        **Error handling:**
        - If a tool call returns an error, do NOT retry the exact same call. Adjust your approach.
        - If multiple sources fail, synthesize what you have rather than continuing to fail.
        - Always store partial findings — something is better than nothing.
      primitives:
        memory:
          enabled: true
          namespace: "agent:{agent_name}:{session_id}"
        browser:
          enabled: true
      hooks:
        auto_memory: true
        auto_trace: true

    coder:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "Coding assistant with memory and code execution"
      system_prompt: |
        You are a coding assistant. Write clean, correct code. Execute it
        to verify results. Store reusable snippets and solutions in memory.
      primitives:
        memory:
          enabled: true
          namespace: "agent:{agent_name}:{session_id}"
        code_interpreter:
          enabled: true
      hooks:
        auto_memory: true
        auto_trace: true

    data-analyst:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "Data analysis agent with code execution and memory"
      system_prompt: |
        You are a data analyst. You write and execute Python code to analyze
        data, create visualizations, and extract insights. You store important
        findings in memory for future reference.

        When given a dataset or analysis task:
        1. Search memory for any prior work on this topic.
        2. Write Python code to load, clean, and analyze the data.
        3. Create visualizations when they help explain findings.
        4. Store key results and insights in memory.

        Use pandas, numpy, and matplotlib. Install packages if needed.
      primitives:
        memory:
          enabled: true
          namespace: "agent:{agent_name}:{session_id}"
          tools:
            - remember
            - search_memory
            - recall
        code_interpreter:
          enabled: true
      hooks:
        auto_memory: true
        auto_trace: true
      max_turns: 15

    coordinator:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "Coordinator that delegates to researcher and coder"
      system_prompt: |
        You are a coordinator agent. You have access to specialized agents:
        - call_researcher: for research and information gathering
        - call_coder: for writing and running code
        Delegate tasks to the appropriate agent. Synthesize their responses
        into a coherent answer for the user.
        IMPORTANT: When tasks can be done independently, call multiple agents
        in parallel by making multiple tool calls in the same response.
      primitives:
        memory:
          enabled: true
        agents:
          enabled: true
          tools: ["researcher", "coder"]
      hooks:
        auto_memory: true
        auto_trace: true

    meta-agent:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "Creates specialized agents on the fly and delegates tasks"
      system_prompt: |
        You are a meta-agent. When you receive a task, you create specialized agents
        tailored to the work and delegate to them.

        Workflow:
        1. Use list_primitives to see what capabilities are available
        2. Use create_agent to build a specialist with the right primitives and a
           focused system prompt. Only enable the primitives the agent actually needs.
        3. Use delegate_to to send the agent its task
        4. Use delete_agent to clean up ephemeral agents when done
        5. Synthesize the results into a final response

        Design each agent's system prompt to be specific and actionable.
        You can create multiple agents and delegate to them in parallel when tasks
        are independent.
      primitives:
        memory:
          enabled: true
        agent_management:
          enabled: true
      hooks:
        auto_memory: true
        auto_trace: true

    planner:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "Decomposes requests into tasks for team execution"
      system_prompt: |
        You are a task planner for a team of specialized agents. Your job is to
        decompose requests into multiple concrete tasks and assign each to the
        right team member. You MUST create tasks for ALL workers when the request
        involves their specialties. Always create at least one task per relevant
        worker. Think carefully about what each worker can do and create tasks
        that fully utilize the team. Where possible, write parallel tasks,
        for instance: if the task is to evaluate 3 things, write out a task for each
        evaluation.
      primitives: {}
      hooks:
        auto_memory: false
        auto_trace: false

    synthesizer:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "Synthesizes team results into coherent responses"
      system_prompt: |
        You are a synthesizer. Given the results of multiple completed tasks,
        produce a clear, comprehensive response that addresses the original request.
      primitives: {}
      hooks:
        auto_memory: false
        auto_trace: false

# ── Teams ─────────────────────────────────────────────────────────────

teams:
  store:
    backend: redis
    config:
      redis_url: "${REDIS_URL:=redis://localhost:6379/0}"
  specs:
    research-team:
      description: "A team that researches topics and writes code collaboratively"
      planner: "planner"
      synthesizer: "synthesizer"
      workers: ["researcher", "coder"]
      shared_memory_namespace: "team:{team_name}"
      global_max_turns: 100
      global_timeout_seconds: 300
