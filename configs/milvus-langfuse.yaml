## Memory backed by mem0 + Milvus, observability by Langfuse.
## Uses Bedrock for LLM and embeddings.
##
## Required:
##   pip install -e ".[mem0,langfuse]"
##
## Usage:
##   ./run.sh milvus-langfuse
##
## Requires:
##   - A running Milvus instance (default: localhost:19530)
##   - AWS credentials for Bedrock (LLM + embeddings)
##   - Langfuse credentials on the client side

providers:
  memory:
    default: "mem0"
    backends:
      mem0:
        backend: "agentic_primitives_gateway.primitives.memory.mem0_provider.Mem0MemoryProvider"
        config:
          vector_store:
            provider: milvus
            config:
              collection_name: agentic_memories_bedrock
              url: "http://${MILVUS_HOST:=localhost}:${MILVUS_PORT:=19530}"
              token: ""
              embedding_model_dims: 1024
          llm:
            provider: aws_bedrock
            config:
              model: us.anthropic.claude-sonnet-4-20250514-v1:0
          embedder:
            provider: aws_bedrock
            config:
              model: amazon.titan-embed-text-v2:0

  observability:
    default: "langfuse"
    backends:
      langfuse:
        backend: "agentic_primitives_gateway.primitives.observability.langfuse.LangfuseObservabilityProvider"
        config: {}

  identity:
    default: "noop"
    backends:
      noop:
        backend: "agentic_primitives_gateway.primitives.identity.noop.NoopIdentityProvider"
        config: {}

  code_interpreter:
    default: "noop"
    backends:
      noop:
        backend: "agentic_primitives_gateway.primitives.code_interpreter.noop.NoopCodeInterpreterProvider"
        config: {}

  browser:
    default: "noop"
    backends:
      noop:
        backend: "agentic_primitives_gateway.primitives.browser.noop.NoopBrowserProvider"
        config: {}

  llm:
    default: "noop"
    backends:
      noop:
        backend: "agentic_primitives_gateway.primitives.llm.noop.NoopLLMProvider"
        config: {}

  tools:
    default: "noop"
    backends:
      noop:
        backend: "agentic_primitives_gateway.primitives.tools.noop.NoopToolsProvider"
        config: {}
