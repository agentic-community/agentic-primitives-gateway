## E2E AgentCore + Strands: all AWS-managed providers, JWT auth, Redis stores,
## Cedar enforcement, per-user credential resolution via Keycloak.
##
## The definitive config for running the gateway with every feature enabled
## against AWS-managed backends. Pairs with examples/e2e-agentcore-strands/.
##
## Features:
##   - JWT authentication (Keycloak OIDC)
##   - Per-user credential resolution from Keycloak user attributes
##   - All AgentCore providers (memory, identity, code_interpreter, browser,
##     observability, tools, policy, evaluations) + Bedrock Converse gateway
##   - Redis-backed stores (agents, teams, tasks) for multi-replica support
##   - Cedar policy enforcement with seed policies
##   - Declarative agents: research-assistant, researcher, coder, coordinator,
##     meta-agent, planner, synthesizer
##   - Team: research-team (planner + synthesizer + [researcher, coder])
##
## Required:
##   pip install -e ".[agentcore,redis,jwt]"
##   Redis running at localhost:6379 (or set REDIS_URL)
##   AWS credentials (environment, IRSA, Pod Identity, etc.)
##
## Optional:
##   JWT_ISSUER / JWT_AUDIENCE / JWT_CLIENT_ID — Keycloak or other OIDC provider
##   AGENTCORE_MEMORY_ID — AgentCore memory resource ID
##
## Keycloak setup for per-user credentials:
##
##   Convention: all credentials are stored as apg.{service}.{key} attributes.
##   Example: apg.langfuse.public_key, apg.mcp_registry.api_key
##
##   Step 1 — Set credentials via the gateway UI:
##     Open /ui/settings in the browser, click "+ Add", and enter the
##     service.key_name (the apg. prefix is added automatically).
##     The gateway writes attributes to Keycloak via the Admin API.
##
##   Step 2 — Expose attributes in userinfo via protocol mappers:
##     For each apg.* attribute you want the resolver to read:
##     Clients → agentic-gateway → Client scopes →
##     agentic-gateway-dedicated → Add mapper → By configuration →
##     User Attribute
##       Name: "apg.langfuse.public_key"
##       User Attribute: "apg.langfuse.public_key"
##       Token Claim Name: "apg.langfuse.public_key"
##       Add to userinfo: ON
##
##   Step 3 — Verify:
##     curl -H "Authorization: Bearer <access-token>" \
##       ${JWT_ISSUER}/protocol/openid-connect/userinfo
##     → should return the apg.* attributes in the JSON response
##
##   The resolver auto-maps by convention:
##     apg.langfuse.public_key  → service_credentials["langfuse"]["public_key"]
##     apg.langfuse.secret_key  → service_credentials["langfuse"]["secret_key"]
##     apg.mcp_registry.api_key → service_credentials["mcp_registry"]["api_key"]
##
## Usage:
##   ./run.sh e2e-agentcore-strands
##
## Environment variables:
##   AWS_REGION          — AWS region (default: us-east-1)
##   AGENTCORE_MEMORY_ID — AgentCore memory resource ID
##   REDIS_URL           — Redis URL (default: redis://localhost:6379/0)
##   JWT_ISSUER          — OIDC issuer URL (leave empty to skip JWT)
##   JWT_AUDIENCE        — Expected audience claim / client ID (optional)
##   JWT_CLIENT_ID       — Public OIDC client ID for UI login (default: agentic-gateway)
##   JWT_GROUPS_CLAIM    — Claim name for groups (default: groups)
##   JWT_SCOPES_CLAIM    — Claim name for scopes (default: scope)
##   KC_ADMIN_CLIENT_ID  — Keycloak admin service account client ID
##   KC_ADMIN_CLIENT_SECRET — Keycloak admin service account client secret

# ── Authentication ────────────────────────────────────────────────────
# JWT via Keycloak (or any OIDC provider). Leave JWT_ISSUER empty to
# fall back to noop auth (admin access, no login required).

auth:
  backend: jwt
  jwt:
    issuer: "${JWT_ISSUER:=-}"
    audience: "${JWT_AUDIENCE:-}"
    client_id: "${JWT_CLIENT_ID:=agentic-gateway}"
    algorithms: ["RS256"]
    claims_mapping:
      groups: "${JWT_GROUPS_CLAIM:=groups}"
      scopes: "${JWT_SCOPES_CLAIM:=scope}"
    jwks_cache_seconds: 300

# ── Providers ─────────────────────────────────────────────────────────
# Every primitive backed by AgentCore / Bedrock.

providers:
  memory:
    default: "agentcore"
    backends:
      agentcore:
        backend: "agentic_primitives_gateway.primitives.memory.agentcore.AgentCoreMemoryProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"
          memory_id: "${AGENTCORE_MEMORY_ID:=}"

  identity:
    default: "agentcore"
    backends:
      agentcore:
        backend: "agentic_primitives_gateway.primitives.identity.agentcore.AgentCoreIdentityProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"

  code_interpreter:
    default: "agentcore"
    backends:
      agentcore:
        backend: "agentic_primitives_gateway.primitives.code_interpreter.agentcore.AgentCoreCodeInterpreterProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"

  browser:
    default: "agentcore"
    backends:
      agentcore:
        backend: "agentic_primitives_gateway.primitives.browser.agentcore.AgentCoreBrowserProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"

  observability:
    default: "agentcore"
    backends:
      agentcore:
        backend: "agentic_primitives_gateway.primitives.observability.agentcore.AgentCoreObservabilityProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"
          service_name: "agentic-primitives-gateway"

  gateway:
    default: "bedrock"
    backends:
      bedrock:
        backend: "agentic_primitives_gateway.primitives.gateway.bedrock.BedrockConverseProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"
          default_model: "us.anthropic.claude-sonnet-4-20250514-v1:0"

  tools:
    default: "agentcore"
    backends:
      agentcore:
        backend: "agentic_primitives_gateway.primitives.tools.agentcore.AgentCoreGatewayProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"

  policy:
    default: "agentcore"
    backends:
      agentcore:
        backend: "agentic_primitives_gateway.primitives.policy.agentcore.AgentCorePolicyProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"

  evaluations:
    default: "agentcore"
    backends:
      agentcore:
        backend: "agentic_primitives_gateway.primitives.evaluations.agentcore.AgentCoreEvaluationsProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"

  tasks:
    default: "redis"
    backends:
      redis:
        backend: "agentic_primitives_gateway.primitives.tasks.redis.RedisTasksProvider"
        config:
          redis_url: "${REDIS_URL:=redis://localhost:6379/0}"

# ── Cedar policy enforcement ──────────────────────────────────────────
# Default-deny when Cedar is active. Seed policies grant baseline access.
# The AgentCore policy provider stores policies durably; seeds are loaded
# at startup so enforcement works out of the box.

enforcement:
  backend: "agentic_primitives_gateway.enforcement.cedar.CedarPolicyEnforcer"
  config:
    policy_refresh_interval: 5

# ── Credential resolution ─────────────────────────────────────────────
# Per-user credentials from Keycloak user attributes via the userinfo
# endpoint. Falls back to server ambient credentials when not present.
#
# Convention-based: all apg.* attributes in userinfo are auto-mapped
# to service credentials by dot-separated naming:
#
#   apg.langfuse.public_key  → service_credentials["langfuse"]["public_key"]
#   apg.langfuse.secret_key  → service_credentials["langfuse"]["secret_key"]
#   apg.mcp_registry.api_key → service_credentials["mcp_registry"]["api_key"]
#
# No explicit attribute mapping config is needed. Just store apg.* attributes
# on Keycloak users and expose them via userinfo protocol mappers.
#
# To set a user's credentials:
#   - Via the UI Settings page (recommended)
#   - OR Keycloak Admin → Users → set apg.* attributes directly
#
# Credential resolution chain (priority order):
#   1. Explicit headers (X-AWS-*, X-Cred-*) — programmatic API clients
#   2. OIDC-resolved credentials — fetched from userinfo (cached 5min)
#   3. Server ambient credentials — AWS env/IRSA (fallback mode)

allow_server_credentials: fallback

credentials:
  resolver: oidc
  oidc:
    aws:
      enabled: false  # Phase 4 — enable when STS federation is set up
  writer:
    backend: keycloak
    # issuer is derived automatically from auth.jwt.issuer (Keycloak realm URL)
    # Uses the Keycloak Admin REST API via a service account to reliably
    # read/write custom user attributes. The Account API doesn't support
    # custom attributes in modern Keycloak versions.
    #
    # To set up the service account:
    #   1. Keycloak Admin → Clients → Create client
    #      - Client ID: "agentic-gateway-admin"
    #      - Client authentication: ON (confidential)
    #      - Service accounts roles: ON
    #   2. Service account roles tab → Assign role → Filter by clients →
    #      realm-management → assign "manage-users"
    #   3. Copy the client secret from the Credentials tab
    config:
      admin_client_id: "${KC_ADMIN_CLIENT_ID:-}"
      admin_client_secret: "${KC_ADMIN_CLIENT_SECRET:-}"
  cache:
    ttl_seconds: 300
    max_entries: 10000

# ── Declarative agents ────────────────────────────────────────────────
# These agents run server-side via the /agents API or the web UI.

agents:
  store:
    backend: redis
    config:
      redis_url: "${REDIS_URL:=redis://localhost:6379/0}"
  specs:
    research-assistant:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "A research assistant with long-term memory and web browsing"
      system_prompt: |
        You are a research assistant with long-term memory.
        Use the remember tool to store important information.
        Use search_memory to find things you've stored before.
        Use recall to retrieve a specific memory by key.
        Always search memory before saying you don't know something.
        Use the browser to look up current information when needed.
      primitives:
        memory:
          enabled: true
          namespace: "agent:{agent_name}"
        browser:
          enabled: true
      max_turns: 100
      hooks:
        auto_memory: true
        auto_trace: true

    researcher:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "A focused researcher that searches memory and the web for information"
      system_prompt: |
        You are a focused researcher. When asked a question, search your memory
        first, then browse the web if needed. Provide thorough, well-sourced
        answers. Store important findings for future reference.
      primitives:
        memory:
          enabled: true
        browser:
          enabled: true
      max_turns: 100
      hooks:
        auto_memory: true
        auto_trace: true

    coder:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "A coding assistant that can write and execute code"
      system_prompt: |
        You are a coding assistant. Write clean, correct code. Execute it
        when asked to verify results. Use the code interpreter for calculations,
        data processing, and prototyping.
      primitives:
        code_interpreter:
          enabled: true
      max_turns: 100
      hooks:
        auto_memory: false
        auto_trace: true

    coordinator:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "A coordinator that delegates tasks to specialized agents"
      system_prompt: |
        You are a coordinator agent. You have access to specialized agents:
        - call_researcher: for research and information gathering
        - call_coder: for writing and running code
        Delegate tasks to the appropriate agent. Synthesize their responses
        into a coherent answer for the user.
        IMPORTANT: When tasks can be done independently, call multiple agents
        in parallel by making multiple tool calls in the same response.
      primitives:
        memory:
          enabled: true
        agents:
          enabled: true
          tools: ["researcher", "coder"]
      hooks:
        auto_memory: true
        auto_trace: true

    meta-agent:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "Creates specialized agents on the fly and delegates tasks to them"
      system_prompt: |
        You are a meta-agent. When you receive a task, you create specialized agents
        tailored to the work and delegate to them.

        Workflow:
        1. Use list_primitives to see what capabilities are available
        2. Use create_agent to build a specialist with the right primitives and a
           focused system prompt. Only enable the primitives the agent actually needs.
        3. Use delegate_to to send the agent its task
        4. Use delete_agent to clean up ephemeral agents when done
        5. Synthesize the results into a final response

        Design each agent's system prompt to be specific and actionable.
        You can create multiple agents and delegate to them in parallel when tasks
        are independent.
      primitives:
        memory:
          enabled: true
        agent_management:
          enabled: true
      hooks:
        auto_memory: true
        auto_trace: true

    planner:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "Decomposes requests into tasks for team execution"
      system_prompt: |
        You are a task planner for a team of specialized agents. Your job is to
        decompose requests into multiple concrete tasks and assign each to the
        right team member. You MUST create tasks for ALL workers when the request
        involves their specialties. Always create at least one task per relevant
        worker. Think carefully about what each worker can do and create tasks
        that fully utilize the team. Where possible, write parallel tasks,
        for instance: if the task is to evaluate 3 things, write out a task for each
        evaluation.
      primitives: {}
      hooks:
        auto_memory: false
        auto_trace: false

    synthesizer:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "Synthesizes team results into coherent responses"
      system_prompt: |
        You are a synthesizer. Given the results of multiple completed tasks,
        produce a clear, comprehensive response that addresses the original request.
      primitives: {}
      hooks:
        auto_memory: false
        auto_trace: false

# ── Teams ─────────────────────────────────────────────────────────────

teams:
  store:
    backend: redis
    config:
      redis_url: "${REDIS_URL:=redis://localhost:6379/0}"
  specs:
    research-team:
      description: "A team that researches topics and writes code collaboratively"
      planner: "planner"
      synthesizer: "synthesizer"
      workers: ["researcher", "coder"]
      shared_memory_namespace: "team:{team_name}"
      global_max_turns: 100
      global_timeout_seconds: 300
