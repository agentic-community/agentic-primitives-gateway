## All providers registered simultaneously. Agents select at request time
## via X-Provider-* headers. Useful for testing provider routing.
##
## Required:
##   pip install -e ".[mem0,agentcore,langfuse,redis]"
##
## Usage:
##   ./run.sh kitchen-sink
##
## Then test routing:
##   curl -H "X-Provider-Memory: in_memory" localhost:8000/api/v1/memory/test
##   curl -H "X-Provider-Memory: mem0"      localhost:8000/api/v1/memory/test

providers:
  memory:
    default: "in_memory"
    backends:
      in_memory:
        backend: "agentic_primitives_gateway.primitives.memory.in_memory.InMemoryProvider"
        config: {}
      mem0:
        backend: "agentic_primitives_gateway.primitives.memory.mem0_provider.Mem0MemoryProvider"
        config:
          vector_store:
            provider: milvus
            config:
              collection_name: agentic_memories
              url: "http://${MILVUS_HOST:=localhost}:${MILVUS_PORT:=19530}"
              token: ""
              embedding_model_dims: 1024
          llm:
            provider: aws_bedrock
            config:
              model: us.anthropic.claude-sonnet-4-20250514-v1:0
          embedder:
            provider: aws_bedrock
            config:
              model: amazon.titan-embed-text-v2:0
      agentcore:
        backend: "agentic_primitives_gateway.primitives.memory.agentcore.AgentCoreMemoryProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"

  observability:
    default: "noop"
    backends:
      noop:
        backend: "agentic_primitives_gateway.primitives.observability.noop.NoopObservabilityProvider"
        config: {}
      langfuse:
        backend: "agentic_primitives_gateway.primitives.observability.langfuse.LangfuseObservabilityProvider"
        config: {}
      agentcore:
        backend: "agentic_primitives_gateway.primitives.observability.agentcore.AgentCoreObservabilityProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"

  identity:
    default: "noop"
    backends:
      noop:
        backend: "agentic_primitives_gateway.primitives.identity.noop.NoopIdentityProvider"
        config: {}
      agentcore:
        backend: "agentic_primitives_gateway.primitives.identity.agentcore.AgentCoreIdentityProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"

  code_interpreter:
    default: "jupyter"
    backends:
      noop:
        backend: "agentic_primitives_gateway.primitives.code_interpreter.noop.NoopCodeInterpreterProvider"
        config: {}
      agentcore:
        backend: "agentic_primitives_gateway.primitives.code_interpreter.agentcore.AgentCoreCodeInterpreterProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"
      jupyter:
        backend: "agentic_primitives_gateway.primitives.code_interpreter.jupyter.JupyterCodeInterpreterProvider"
        config:
          base_url: "${JUPYTER_URL:=http://localhost:8888}"
          token: "${JUPYTER_TOKEN:=}"
          kernel_name: "${JUPYTER_KERNEL:=python3}"
          execution_timeout: 30.0
          file_root: "${JUPYTER_FILE_ROOT:=/tmp}"

  browser:
    default: "noop"
    backends:
      noop:
        backend: "agentic_primitives_gateway.primitives.browser.noop.NoopBrowserProvider"
        config: {}
      agentcore:
        backend: "agentic_primitives_gateway.primitives.browser.agentcore.AgentCoreBrowserProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"
      selenium_grid:
        backend: "agentic_primitives_gateway.primitives.browser.selenium_grid.SeleniumGridBrowserProvider"
        config:
          hub_url: "${SELENIUM_HUB_URL:=http://localhost:4444}"
          browser: "${SELENIUM_BROWSER:=chrome}"

  policy:
    default: "noop"
    backends:
      noop:
        backend: "agentic_primitives_gateway.primitives.policy.noop.NoopPolicyProvider"
        config: {}
      agentcore:
        backend: "agentic_primitives_gateway.primitives.policy.agentcore.AgentCorePolicyProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"

  evaluations:
    default: "noop"
    backends:
      noop:
        backend: "agentic_primitives_gateway.primitives.evaluations.noop.NoopEvaluationsProvider"
        config: {}
      langfuse:
        backend: "agentic_primitives_gateway.primitives.evaluations.langfuse.LangfuseEvaluationsProvider"
        config: {}
      agentcore:
        backend: "agentic_primitives_gateway.primitives.evaluations.agentcore.AgentCoreEvaluationsProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"

  llm:
    default: "bedrock"
    backends:
      noop:
        backend: "agentic_primitives_gateway.primitives.llm.noop.NoopLLMProvider"
        config: {}
      bedrock:
        backend: "agentic_primitives_gateway.primitives.llm.bedrock.BedrockConverseProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"
          default_model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      openai_compatible:
        backend: "agentic_primitives_gateway.primitives.llm.openai_compatible.OpenAICompatibleProvider"
        config:
          base_url: "${OPENAI_COMPATIBLE_URL:=http://localhost:1234}"
          default_model: "${OPENAI_COMPATIBLE_MODEL:=}"
          api_key: "${OPENAI_COMPATIBLE_API_KEY:=}"

  tasks:
    default: "in_memory"
    backends:
      noop:
        backend: "agentic_primitives_gateway.primitives.tasks.noop.NoopTasksProvider"
        config: {}
      in_memory:
        backend: "agentic_primitives_gateway.primitives.tasks.in_memory.InMemoryTasksProvider"
        config: {}
      redis:
        backend: "agentic_primitives_gateway.primitives.tasks.redis.RedisTasksProvider"
        config:
          redis_url: "${REDIS_URL:=redis://localhost:6379/0}"

  tools:
    default: "noop"
    backends:
      noop:
        backend: "agentic_primitives_gateway.primitives.tools.noop.NoopToolsProvider"
        config: {}
      agentcore:
        backend: "agentic_primitives_gateway.primitives.tools.agentcore.AgentCoreGatewayProvider"
        config:
          region: "${AWS_REGION:=us-east-1}"
      mcp_registry:
        backend: "agentic_primitives_gateway.primitives.tools.mcp_registry.MCPRegistryProvider"
        config:
          base_url: "${MCP_REGISTRY_URL:=http://localhost:8080}"
          verify_ssl: false

## Policy enforcement via Cedar. The CedarPolicyEnforcer evaluates every
## request against Cedar policies loaded from the policy provider above.
## Default-deny: when enabled with no policies, all non-exempt requests
## are blocked. Policies are refreshed from the store every N seconds.
##
## Actions are auto-discovered from route definitions:
##   memory:store_memory, memory:retrieve_memory, gateway:route_completion, etc.
##
## Seed policies are loaded into the policy provider at startup so that
## enforcement works out of the box even with the noop (in-memory) provider.
enforcement:
  backend: "agentic_primitives_gateway.enforcement.cedar.CedarPolicyEnforcer"
  config:
    policy_refresh_interval: 5   # short interval for demo; use 30+ in production
  seed_policies:
    - description: "Allow anyone to list agents"
      policy_body: 'permit(principal, action == Action::"agents:list_agents", resource);'
    - description: "Allow anyone to view individual agents"
      policy_body: 'permit(principal, action == Action::"agents:get_agent", resource);'
    - description: "Allow anyone to view anything"
      policy_body: 'permit(principal, action, resource);'
allow_server_credentials: fallback

credentials:
  resolver: noop
  writer:
    backend: noop
  cache:
    ttl_seconds: 300
    max_entries: 10000

## Governance: structured audit events with fan-out to every built-in sink.
## stdout_json is always-on by default; additional sinks layer on top with
## per-sink failure isolation. See docs/concepts/governance.md.
audit:
  enabled: true
  stdout_json: true
  sinks:
    - name: local_file
      backend: file
      config:
        path: "${APG_AUDIT_LOG_PATH:=/tmp/apg-audit.log}"
        max_bytes: 10485760   # 10 MiB
        backup_count: 5
    - name: durable
      backend: redis_stream
      config:
        redis_url: "${REDIS_URL:=redis://localhost:6379/0}"
        stream: "gateway:audit"
        maxlen: 100000
    - name: traces
      backend: observability
  redact_keys: []
  redact_principal_id: false
  queue_size: 2048
  sink_timeout_seconds: 2.0

## Structured JSON app logs + secret-pattern scrubbing.
logging:
  format: json
  sanitize: true

agents:
  store:
    backend: redis
    config:
      redis_url: "${REDIS_URL:=redis://localhost:6379/0}"
  specs:
    research-assistant:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "A research assistant with long-term memory"
      system_prompt: |
        You are a research assistant with long-term memory.
        Use the remember tool to store important information.
        Use search_memory to find things you've stored before.
        Use recall to retrieve a specific memory by key.
        Always search memory before saying you don't know something.
      primitives:
        memory:
          enabled: true
          namespace: "agent:{agent_name}:{session_id}"
        browser:
          enabled: true
      provider_overrides:
        browser: "selenium_grid"
      max_turns: 100
      hooks:
        auto_memory: true
        auto_trace: false
    researcher:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "A focused researcher that searches memory and the web for information"
      system_prompt: |
        You are a focused researcher with web browsing capabilities and long-term memory.

        **Research workflow:**
        1. Always search_memory first — you may already have the answer from previous research.
        2. If not in memory, browse the web. Use navigate to visit pages, read_page to extract content.
        3. Store important findings with remember so you don't repeat work.

        **Web browsing best practices:**
        - For web searches, use DuckDuckGo (https://duckduckgo.com/?q=your+query) instead of Google.
          Google often blocks automated browsers with CAPTCHAs.
        - After navigating, always read_page first to understand the page before interacting.
        - If you get a "NoSuchElementException" (element not found), read_page to see the current
          page state, then try a different selector or approach.
        - If you hit a CAPTCHA, access denied, or bot detection page, go back and try a different
          website. Do not waste turns trying to bypass it.
        - Prefer reading article content directly over clicking through complex navigation.
        - If a site is paywalled or requires login, move on to another source.
        - Use evaluate_js as a last resort to extract content when read_page doesn't capture it
          (e.g., dynamically loaded content).

        **Error handling:**
        - If a tool call returns an error, do NOT retry the exact same call. Adjust your approach.
        - If multiple sources fail, synthesize what you have rather than continuing to fail.
        - Always store partial findings — something is better than nothing.
      primitives:
        memory:
          enabled: true
        browser:
          enabled: true
      provider_overrides:
        browser: "selenium_grid"
      max_turns: 100
      hooks:
        auto_memory: true
        auto_trace: false
    coder:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "A coding assistant that can write and execute code"
      system_prompt: |
        You are a coding assistant. Write clean, correct code. Execute it
        when asked to verify results.
      primitives:
        code_interpreter:
          enabled: true
      provider_overrides:
        code_interpreter: "jupyter"
      max_turns: 100
      hooks:
        auto_memory: false
        auto_trace: false
    coordinator:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "A coordinator that delegates tasks to specialized agents"
      system_prompt: |
        You are a coordinator agent. You have access to specialized agents:
        - call_researcher: for research and information gathering
        - call_coder: for writing and running code
        Delegate tasks to the appropriate agent. Synthesize their responses
        into a coherent answer for the user.
        IMPORTANT: When tasks can be done independently, call multiple agents
        in parallel by making multiple tool calls in the same response.
        For example, if you need research AND code, call both agents at once.
        If you need 3 separate scripts written, make 3 parallel call_coder calls.
      primitives:
        memory:
          enabled: true
        agents:
          enabled: true
          tools: ["researcher", "coder"]
      hooks:
        auto_memory: true
        auto_trace: false
    meta-agent:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "Creates specialized agents on the fly and delegates tasks to them"
      system_prompt: |
        You are a meta-agent. When you receive a task, you create specialized agents
        tailored to the work and delegate to them.

        Workflow:
        1. Use list_primitives to see what capabilities are available
        2. Use create_agent to build a specialist with the right primitives and a
           focused system prompt. Only enable the primitives the agent actually needs.
        3. Use delegate_to to send the agent its task
        4. Use delete_agent to clean up ephemeral agents when done
        5. Synthesize the results into a final response

        Design each agent's system prompt to be specific and actionable. A web
        scraper agent should know it scrapes web pages. A data analyst should know
        it analyzes data. The more focused the prompt, the better the result.

        You can create multiple agents and delegate to them in parallel when tasks
        are independent.
      primitives:
        memory:
          enabled: true
        agent_management:
          enabled: true
      hooks:
        auto_memory: true
        auto_trace: false
    planner:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "Decomposes requests into tasks for team execution"
      system_prompt: |
        You are a task planner for a team of specialized agents. Your job is to
        decompose requests into multiple concrete tasks and assign each to the
        right team member. You MUST create tasks for ALL workers when the request
        involves their specialties. Always create at least one task per relevant
        worker. Think carefully about what each worker can do and create tasks
        that fully utilize the team. Where possible, write parallel tasks,
        for instance: if the task is to evaluate 3 things, write out a task for each
        evaluation.
      primitives: {}
      hooks:
        auto_memory: false
        auto_trace: false
    synthesizer:
      model: "us.anthropic.claude-sonnet-4-20250514-v1:0"
      description: "Synthesizes team results into coherent responses"
      system_prompt: |
        You are a synthesizer. Given the results of multiple completed tasks,
        produce a clear, comprehensive response that addresses the original request.
      primitives: {}
      hooks:
        auto_memory: false
        auto_trace: false

teams:
  store:
    backend: redis
    config:
      redis_url: "${REDIS_URL:=redis://localhost:6379/0}"
  specs:
    research-team:
      description: "A team that researches topics and writes code collaboratively"
      planner: "planner"
      synthesizer: "synthesizer"
      workers: ["researcher", "coder"]
      shared_memory_namespace: "team:{team_name}"
      global_max_turns: 100
      global_timeout_seconds: 300
